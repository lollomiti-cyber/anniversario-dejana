<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You, My Love</title>
  <meta name="description" content="A little collection of romantic phrases just for you." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="sky" id="sky"></div>

  <main class="wrapper">
    <header class="intro">
      <p class="eyebrow">a little something</p>
      <h1>For You, My Love&nbsp;💛</h1>
      <p class="subtitle">Press a heart to hear something I want you to know.</p>
    </header>

    <section class="hearts" id="hearts" aria-label="Romantic messages"></section>

    <footer class="footer">
      <p id="now-playing" class="now-playing" aria-live="polite">&nbsp;</p>
      <p class="signature">made with love, just for you</p>
    </footer>
  </main>

  <audio id="player" preload="none"></audio>

  <script src="/script.js"></script>
</body>
</html>
